<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AR EDITZ</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{
background:#050505;
color:white;
overflow-x:hidden;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

body::before{
content:'';
position:fixed;
width:500px;
height:500px;
background:orange;
filter:blur(180px);
opacity:.15;
top:-150px;
left:-150px;
animation:float1 8s infinite alternate;
}

body::after{
content:'';
position:fixed;
width:400px;
height:400px;
background:#ff6600;
filter:blur(150px);
opacity:.15;
bottom:-100px;
right:-100px;
animation:float2 10s infinite alternate;
}

@keyframes float1{
from{transform:translate(0,0);}
to{transform:translate(100px,80px);}
}

@keyframes float2{
from{transform:translate(0,0);}
to{transform:translate(-100px,-80px);}
}

.card{
width:100%;
max-width:900px;
background:rgba(10,10,10,.85);
border:1px solid rgba(255,140,0,.3);
backdrop-filter:blur(20px);
border-radius:30px;
padding:30px;
text-align:center;
box-shadow:
0 0 15px rgba(255,140,0,.3),
0 0 50px rgba(255,140,0,.15);
animation:appear 1s ease;
}

@keyframes appear{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.logo{
font-size:3rem;
font-weight:900;
color:#ff9d00;
text-shadow:
0 0 10px #ff9d00,
0 0 25px #ff9d00,
0 0 50px #ff6600;
animation:pulse 2s infinite;
}

@keyframes pulse{
50%{
text-shadow:
0 0 20px #ff9d00,
0 0 40px #ff9d00,
0 0 80px #ff6600;
}
}

.subtitle{
margin-top:10px;
color:#aaa;
letter-spacing:3px;
}

.commit-box{
margin-top:25px;
padding:15px;
border-radius:15px;
background:rgba(255,140,0,.05);
border:1px solid rgba(255,140,0,.2);
}

.commit-title{
color:#ffb347;
font-size:1.1rem;
word-break:break-word;
}

.commit-sha{
margin-top:8px;
color:#777;
font-size:.9rem;
}

.media-wrapper{
margin-top:25px;
position:relative;
}

img,video{
width:100%;
border-radius:20px;
border:2px solid rgba(255,140,0,.4);
box-shadow:
0 0 20px rgba(255,140,0,.3),
0 0 60px rgba(255,140,0,.1);
animation:glow 3s infinite alternate;
}

@keyframes glow{
from{
box-shadow:
0 0 15px rgba(255,140,0,.3),
0 0 40px rgba(255,140,0,.1);
}
to{
box-shadow:
0 0 25px rgba(255,140,0,.5),
0 0 80px rgba(255,140,0,.2);
}
}

.download-btn{
display:none;
margin-top:25px;
padding:16px 35px;
background:linear-gradient(45deg,#ff6b00,#ffb300);
border:none;
border-radius:15px;
font-size:1rem;
font-weight:700;
text-decoration:none;
color:black;
transition:.3s;
box-shadow:
0 0 15px rgba(255,140,0,.5);
}

.download-btn:hover{
transform:translateY(-4px) scale(1.05);
box-shadow:
0 0 25px rgba(255,140,0,.8),
0 0 60px rgba(255,140,0,.4);
}

.loading{
padding:40px;
font-size:1.2rem;
color:#ffb347;
}

.spinner{
width:60px;
height:60px;
margin:20px auto;
border:4px solid rgba(255,140,0,.2);
border-top:4px solid orange;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

.footer{
margin-top:25px;
font-size:.8rem;
color:#666;
}
</style>
</head>
<body>

<div class="card">

<div class="logo">AR EDITZ</div>
<div class="subtitle">LATEST EDIT DROP</div>

<div id="status" class="loading">
<div class="spinner"></div>
Fetching Latest Upload...
</div>

<div id="commitBox" style="display:none;" class="commit-box">
<div id="commitTitle" class="commit-title"></div>
<div id="commitSha" class="commit-sha"></div>
</div>

<div id="mediaContainer" class="media-wrapper"></div>

<a id="downloadBtn" class="download-btn" download>
⬇ DOWNLOAD FILE
</a>

<div class="footer">
Powered By ARMAAN :) • AR EDITZ
</div>

</div>

<script>

const OWNER = "armaanop-gg";
const REPO = "AR-EDITZ";
const BRANCH = "edits";

async function loadLatestCommit(){

try{

const response = await fetch(
`https://api.github.com/repos/${OWNER}/${REPO}/commits/${BRANCH}`
);

const data = await response.json();

document.getElementById("status").style.display="none";
document.getElementById("commitBox").style.display="none";

document.getElementById("commitTitle").innerText =
data.commit.message;

document.getElementById("commitSha").innerText =
"Commit: " + data.sha.substring(0,7);

const message = data.commit.message;

const commitSha = data.sha;

// Get files from latest commit
const commitDetails = await fetch(
  `https://api.github.com/repos/${OWNER}/${REPO}/commits/${commitSha}`
);

const commitData = await commitDetails.json();

if (!commitData.files || commitData.files.length === 0) {
  document.getElementById("mediaContainer").innerHTML =
    "<h2 style='color:#ffb347'>No Files Found</h2>";
  return;
}

// First file in commit
const firstFile = commitData.files[0];

// Raw GitHub URL
const mediaUrl =
  `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${firstFile.filename}`;

const container = document.getElementById("mediaContainer");

if (/\.(mp4|webm|mov)$/i.test(mediaUrl)) {

  container.innerHTML = `
    <video controls autoplay muted loop playsinline>
      <source src="${mediaUrl}">
    </video>
  `;

} else if (/\.(png|jpg|jpeg|gif|webp)$/i.test(mediaUrl)) {

  container.innerHTML = `
    <img src="${mediaUrl}" alt="Latest Upload">
  `;

} else {

  container.innerHTML = `
    <div style="
      padding:20px;
      border:1px solid rgba(255,140,0,.3);
      border-radius:15px;
      color:#ffb347;
    ">
      📄 ${firstFile.filename}
    </div>
  `;

}

const btn = document.getElementById("downloadBtn");
btn.href = mediaUrl;
btn.download = firstFile.filename;
btn.style.display = "inline-block";

const btn =
document.getElementById("downloadBtn");

btn.href = mediaUrl;
btn.style.display="inline-block";

}catch(e){

document.getElementById("status").innerHTML=
"Failed To Fetch Latest Upload";

console.error(e);

}

}

loadLatestCommit();

</script>

</body>
</html>
