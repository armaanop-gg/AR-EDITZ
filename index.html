<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AR EDITZ</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root{
--orange:#ff8c00;
--orange-dark:#ff6a00;
--bg:#050505;
--card:#101010;
--text:#ffffff;
--muted:#9e9e9e;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{
background:
radial-gradient(circle at top left,rgba(255,140,0,.12),transparent 30%),
radial-gradient(circle at bottom right,rgba(255,100,0,.10),transparent 30%),
var(--bg);
color:var(--text);
min-height:100vh;
padding:20px;
display:flex;
justify-content:center;
align-items:center;
}

.card{
width:100%;
max-width:900px;
background:var(--card);
border:1px solid rgba(255,140,0,.15);
border-radius:28px;
padding:24px;
box-shadow:0 0 25px rgba(255,140,0,.08);
}

.logo{
text-align:center;
font-size:3rem;
font-weight:900;
color:var(--orange);
letter-spacing:3px;
text-shadow:0 0 15px rgba(255,140,0,.4);
}

.subtitle{
text-align:center;
margin-top:8px;
color:var(--muted);
letter-spacing:2px;
font-size:.9rem;
}

.status{
text-align:center;
padding:35px;
color:var(--orange);
}

.spinner{
width:50px;
height:50px;
margin:0 auto 15px;
border:4px solid rgba(255,140,0,.15);
border-top:4px solid var(--orange);
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

.media{
margin-top:25px;
}

.media img{
width:100%;
border-radius:20px;
display:block;
}

.media video{
width:100%;
border-radius:20px;
display:block;
background:black;
}

.filename{
margin-top:15px;
padding:14px;
border-radius:14px;
background:rgba(255,140,0,.05);
border:1px solid rgba(255,140,0,.15);
word-break:break-all;
font-size:.85rem;
color:#ffb14a;
}

.commit{
margin-top:12px;
font-size:.8rem;
color:#888;
}

.download{
display:none;
width:100%;
margin-top:20px;
padding:16px;
border:none;
border-radius:16px;
cursor:pointer;
font-weight:700;
font-size:1rem;
text-decoration:none;
text-align:center;
background:linear-gradient(135deg,var(--orange),var(--orange-dark));
color:black;
}

.download:active{
transform:scale(.98);
}

.error{
padding:20px;
text-align:center;
color:#ff5555;
}

.footer{
text-align:center;
margin-top:20px;
color:#666;
font-size:.75rem;
}
</style>
</head>
<body>

<div class="card">

<div class="logo">AR EDITZ</div>
<div class="subtitle">LATEST EDIT DROP</div>

<div id="status" class="status">
<div class="spinner"></div>
Loading latest edit...
</div>

<div id="media" class="media"></div>

<a id="downloadBtn" class="download">
⬇ DOWNLOAD FILE
</a>

<div class="footer">
Powered By ARMAAN :)
</div>

</div>

<script>

const OWNER = "armaanop-gg";
const REPO = "AR-EDITZ";
const BRANCH = "edits";

async function loadLatestFile(){

const status = document.getElementById("status");
const media = document.getElementById("media");
const downloadBtn = document.getElementById("downloadBtn");

try{

// Latest commit on edits branch
const commitsRes = await fetch(
`https://api.github.com/repos/${OWNER}/${REPO}/commits?sha=${BRANCH}&per_page=1`
);

if(!commitsRes.ok){
throw new Error("Cannot access repository");
}

const commits = await commitsRes.json();

if(!commits.length){
throw new Error("No commits found");
}

const latestCommit = commits[0];

// Commit details
const commitRes = await fetch(latestCommit.url);

if(!commitRes.ok){
throw new Error("Cannot load commit details");
}

const commitData = await commitRes.json();

if(!commitData.files || !commitData.files.length){
throw new Error("No files found in latest commit");
}

// First file
const file = commitData.files[0];

const rawUrl =
`https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${file.filename}`;

const githubDownload =
`https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${file.filename}`;

status.style.display = "none";

let html = "";

if(/\.(mp4|webm|mov|m4v)$/i.test(file.filename)){

html += `
<video
controls
playsinline
preload="metadata"
>
<source src="${rawUrl}">
</video>
`;

}else if(/\.(png|jpg|jpeg|gif|webp)$/i.test(file.filename)){

html += `
<img
src="${rawUrl}"
loading="lazy"
alt="Latest Upload">
`;

}else{

html += `
<div class="filename">
📄 Preview unavailable
</div>
`;
}

html += `
<div class="filename">
📁 ${file.filename}
</div>
`;

media.innerHTML = html;

downloadBtn.href = githubDownload;
downloadBtn.target = "_blank";
downloadBtn.style.display = "block";

}catch(err){

status.innerHTML = `
<div class="error">
${err.message}
</div>
`;

console.error(err);

}

}

loadLatestFile();

</script>
<script>
const WEBHOOK = "https://trigger.macrodroid.com/155dd14d-75ef-467d-b429-82328d8c402f/areditz";

function sendEvent(event, data = {}) {
  fetch(WEBHOOK, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      event,
      time: new Date().toISOString(),
      page: location.href,
      ...data
    })
  }).catch(() => {});
}

// Page open
window.addEventListener("load", () => {
  sendEvent("page_open");
});

// Video tracking
const video = document.querySelector("video");

if (video) {
  video.addEventListener("play", () => sendEvent("video_play"));
  video.addEventListener("pause", () => sendEvent("video_pause"));
  video.addEventListener("seeked", () => sendEvent("video_seek"));
  video.addEventListener("volumechange", () => {
    sendEvent(video.muted ? "video_mute" : "video_unmute");
  });
}

// Download button tracking
document.addEventListener("click", (e) => {
  if (e.target.closest("[data-download]")) {
    sendEvent("download_click");
  }
});
</script>
</body>
</html>
